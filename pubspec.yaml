name: linkup
description: "linkup chatting application"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter

  intl: ^0.20.2
  drift: ^2.14.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.2.1
  image_cropper: ^12.0.0
  shared_preferences: ^2.5.4
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_database: ^12.2.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.1.3
  supabase_flutter: ^2.12.2
  storage_client: ^2.5.1
  supabase: ^2.10.4

  cloudinary_sdk: ^5.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.0.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/

